name: sangemarmar_vts
description: Sangemarmar Vehicle Tracking System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  dio: ^5.4.3+1

  # Navigation
  go_router: ^13.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # UI
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # File download / open
  path_provider: ^2.1.3
  open_filex: ^4.3.4

  # Utils
  equatable: ^2.0.5
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
